<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #stage{position:fixed;inset:0;background:#000}
  #stage img,#stage iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:contain;background:#000;
  }
  #idle{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:#9aa;font:18px/1.5 system-ui,sans-serif;text-align:center;padding:24px;
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="idle">Waiting for content…</div>

  <script>
    const stage = document.getElementById('stage');
    const idle = document.getElementById('idle');
    let items = [];
    let pos = 0;
    let timer = null;
    let signature = '';   // detects when the playlist changes, to reload it

    async function loadData() {
      try {
        const r = await fetch('/api/screen-data', { cache: 'no-store' });
        const data = await r.json();
        const sig = JSON.stringify(data.items || []);
        if (sig !== signature) {     // playlist changed -> restart rotation
          signature = sig;
          items = data.items || [];
          pos = 0;
          show();
        }
      } catch (e) { /* keep showing what we have if the fetch fails */ }
    }

    function show() {
      if (timer) clearTimeout(timer);
      if (!items.length) { idle.style.display = 'flex'; stage.innerHTML = ''; return; }
      idle.style.display = 'none';
      const item = items[pos % items.length];

      const el = item.type === 'image'
        ? Object.assign(document.createElement('img'), { src: item.src })
        : Object.assign(document.createElement('iframe'), {
            src: item.src, allow: 'autoplay; fullscreen',
          });

      stage.innerHTML = '';
      stage.appendChild(el);

      const secs = Math.max(3, item.seconds || 10);
      timer = setTimeout(() => { pos = (pos + 1) % items.length; show(); }, secs * 1000);
    }

    loadData();
    setInterval(loadData, 15000);   // pick up playlist changes within 15s
  </script>
</body>
</html>
