<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif}
  #stage{position:fixed;inset:0;background:#000;overflow:hidden}
  /* Each playlist item lives in its own absolutely-stacked layer. Layers are
     built once and kept mounted; switching items crossfades opacity so there is
     never a black gap or a "loading" flash between items. The black stage
     background shows through any letterboxing. */
  #stage .layer{position:absolute;inset:0;opacity:0;transition:opacity .4s ease;background:#000}
  #stage .layer.active{opacity:1}
  /* Inactive layers stay rendered (opacity:0, NOT display:none) so the browser
     does not throttle/pause their iframes. */
  #stage .layer img{position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:contain;background:#000}
  #stage .layer iframe{position:absolute;left:0;top:0;width:100%;height:100%;border:0;background:#000}
  #stage .layer video{position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:contain;background:#000}
  /* A Google Slides embed always renders a bottom control/branding bar that no
     URL param can disable. Oversize the iframe so that bar falls past the bottom
     of the (overflow:hidden) stage and is clipped away. */
  #stage .layer iframe.slides{height:calc(100% + 60px)}

  /* The idle / setup screen — shown only when there is nothing to play, the
     playlist is empty, or the device is first being set up. It is the one place
     the device's address lives; while content plays, the screen stays clean. */
  #idle{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
        color:#9aa;text-align:center;padding:24px}
  #idle .big{font-size:clamp(20px,3.2vw,32px);color:#cdd;margin-bottom:16px}
  #idle .hint{font-size:clamp(14px,1.7vw,19px);color:#9aa;line-height:1.5}
  #idle b,#pair .url{color:#F0A93B;font-weight:700}
  .qr{display:none;margin:22px auto 6px;width:min(34vmin,240px);height:auto;
      background:#fff;padding:12px;border-radius:14px;image-rendering:pixelated}
  .qrcap{color:#7d8a86;font-size:clamp(12px,1.4vw,15px);letter-spacing:.04em}
  .addrs{color:#c7d0cd;font:600 clamp(14px,1.9vw,20px)/1.6 ui-monospace,monospace;
         margin-top:10px;white-space:pre-line}

  #pair{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
        background:rgba(8,10,12,.92);color:#fff;text-align:center;padding:24px;z-index:10}
  #pair .label{color:#9aa;font-size:20px;margin-bottom:18px}
  #pair .code{font:700 clamp(48px,12vw,140px)/1 ui-monospace,monospace;letter-spacing:.12em;color:#F0A93B}
  #pair .sub{color:#9aa;font-size:16px;margin-top:18px}

  /* Boot splash: on startup, show the address (~1 min) so a freshly-rebooted
     screen is easy to find on the network before content takes over. */
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
        background:#000;color:#9aa;text-align:center;padding:24px;z-index:8}
  #boot .big{font-size:clamp(18px,2.6vw,26px);color:#cdd;margin-bottom:8px}
  #boot .addr{font:700 clamp(22px,4vw,44px)/1.1 ui-monospace,monospace;color:#F0A93B;margin:6px 0}
  #boot .hint{font-size:clamp(13px,1.6vw,18px);color:#9aa}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="idle">
    <div>
      <div class="big">Waiting for content&hellip;</div>
      <div class="hint">Open one of these on your phone or computer to set it up</div>
      <div class="addrs" id="idleAddrs"></div>
      <img id="qrIdle" class="qr" alt="QR code that opens this device">
      <div class="qrcap" id="qrIdleCap" style="display:none">Scan to open</div>
    </div>
  </div>
  <div id="pair">
    <div class="label">To connect this screen, enter this code on your controller</div>
    <div class="code" id="pairCode"></div>
    <img id="qrPair" class="qr" alt="QR code that opens this device">
    <div class="sub">This code disappears in a few minutes. &middot; This screen: <span class="url" id="pairUrl"></span></div>
  </div>
  <div id="boot">
    <div>
      <div class="big">Starting up&hellip;</div>
      <div class="hint">Open one of these on your phone or computer to set it up</div>
      <div class="addrs" id="bootAddrs"></div>
      <img id="qrBoot" class="qr" alt="QR code that opens this device">
      <div class="qrcap" id="qrBootCap" style="display:none">Scan to open</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const idle = document.getElementById('idle');
    const pair = document.getElementById('pair');
    const pairCode = document.getElementById('pairCode');

    let items = [];        // playlist items, in playlist order
    let order = [];        // play sequence (indices into items): shuffled or 0..n-1
    let pos = 0;           // position within `order`
    let signature = '';    // detects when the content/shuffle actually changed
    let shuffle = false;
    let lastUrl = '';      // current connect URL (so the QR refreshes if the IP changes)
    let bootDone = false;  // true after the startup address splash has elapsed
    let layers = [];       // mounted layer per item (built once, reused)

    let cycleTimer = null;   // advances items, and slides WITHIN a pptx slideshow
    let pendingSlide = null; // {iframe, timer}: a Google Slides reload still loading

    function dur(item) { return Math.max(3, item.seconds || 10) * 1000; }

    function embedSrc(u) {
      // Google Slides '/pub' links send X-Frame-Options: SAMEORIGIN and refuse to
      // load in an iframe; '/embed' is the frameable form. Force loop=false so the
      // deck holds on its LAST slide rather than cycling back to slide 1.
      u = u || '';
      if (!/docs\.google\.com\/presentation/.test(u)) return u;
      return u.replace('/pub', '/embed').replace(/loop=true/, 'loop=false');
    }
    function isSlides(u) { return /docs\.google\.com\/presentation/.test(u || ''); }

    async function loadData() {
      try {
        const r = await fetch('/api/screen-data', { cache: 'no-store' });
        const data = await r.json();

        // List every address the device has, labeled (Wi-Fi / Ethernet), one per
        // line — never 127.0.0.1. When it has none yet, say so instead.
        const addrs = data.addresses || [];
        const addrText = addrs.length
          ? addrs.map(function (a) { return a.label + ':  ' + a.url; }).join('\n')
          : 'Not connected to a network yet';
        document.getElementById('idleAddrs').textContent = addrText;
        document.getElementById('bootAddrs').textContent = addrText;
        const qi = document.getElementById('qrIdle'),
              qp = document.getElementById('qrPair'),
              qb = document.getElementById('qrBoot');
        if (data.connect_url) {
          document.getElementById('pairUrl').textContent = data.connect_url;
          if (data.connect_url !== lastUrl) {
            lastUrl = data.connect_url;
            const qsrc = '/qr.png?u=' + encodeURIComponent(data.connect_url);
            qi.onload = () => { qi.style.display = 'block'; document.getElementById('qrIdleCap').style.display = 'block'; };
            qp.onload = () => { qp.style.display = 'block'; };
            qb.onload = () => { qb.style.display = 'block'; document.getElementById('qrBootCap').style.display = 'block'; };
            qi.onerror = qp.onerror = qb.onerror = () => { lastUrl = ''; };  // retry next poll
            qi.src = qsrc; qp.src = qsrc; qb.src = qsrc;
          }
        } else {
          // No network yet: nothing to encode, so hide the QR and clear stale state.
          lastUrl = '';
          document.getElementById('pairUrl').textContent = '';
          [qi, qp, qb].forEach((e) => { e.style.display = 'none'; e.removeAttribute('src'); });
          document.getElementById('qrIdleCap').style.display = 'none';
          document.getElementById('qrBootCap').style.display = 'none';
        }

        if (data.pairing_code) {
          pairCode.textContent = data.pairing_code;
          pair.style.display = 'flex';
        } else {
          pair.style.display = 'none';
        }

        const sig = JSON.stringify({ i: data.items || [], s: !!data.shuffle });
        if (sig !== signature) {
          signature = sig;
          items = data.items || [];
          shuffle = !!data.shuffle;
          pos = 0;
          rebuild();
          buildOrder();
          playCurrent();
        }
      } catch (e) { /* keep showing what we have if a fetch fails */ }
    }

    // Build the DOM layer for one item: an <img> (image / pptx slideshow) or an
    // <iframe> (web page / Google Slides).
    function buildLayer(item) {
      const layer = document.createElement('div');
      layer.className = 'layer';
      let el;
      if (item.type === 'image') {
        el = document.createElement('img');
        el.src = embedSrc(item.src);
      } else if (item.type === 'slideshow') {
        el = document.createElement('img');   // src is set per-slide while playing
      } else if (item.type === 'video') {
        el = document.createElement('video');
        el.muted = true; el.defaultMuted = true; el.setAttribute('muted', '');
        el.playsInline = true; el.setAttribute('playsinline', '');
        el.preload = 'none';          // don't buffer every video at once; load on play
        el.src = item.src;
      } else {
        el = document.createElement('iframe');
        el.src = embedSrc(item.src);
        el.allow = 'autoplay; fullscreen';
        if (isSlides(item.src)) el.className = 'slides';
      }
      layer.appendChild(el);
      return layer;
    }

    // Reconcile mounted layers with the current items, reusing a layer when the
    // same content is still at the same slot so iframes are not needlessly reloaded.
    function rebuild() {
      const next = [];
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const content = item.src || (item.srcs || []).join(',');
        const key = i + '|' + item.type + '|' + content;
        const prev = layers[i];
        let entry;
        if (prev && prev.key === key) {
          entry = prev;
          entry.item = item;            // refresh (e.g. an edited per-slide time)
        } else {
          const src = (item.type === 'url' || item.type === 'image') ? embedSrc(item.src) : '';
          entry = { key, item, src, slides: item.type === 'url' && isSlides(item.src || ''), el: buildLayer(item) };
          stage.appendChild(entry.el);
        }
        next.push(entry);
      }
      for (const old of layers) {
        if (!next.includes(old) && old.el.parentNode) old.el.parentNode.removeChild(old.el);
      }
      layers = next;
    }

    // Default order is top-to-bottom, exactly as listed. Shuffle is opt-in.
    function buildOrder() {
      order = items.map((_, i) => i);
      if (shuffle) {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      }
    }

    function clearPendingSlide() {
      if (pendingSlide) { clearTimeout(pendingSlide.timer); pendingSlide.iframe.onload = null; pendingSlide = null; }
    }
    function clearTimers() {
      if (cycleTimer) { clearTimeout(cycleTimer); cycleTimer = null; }
      clearPendingSlide();
      layers.forEach(e => {
        const v = e.el.querySelector('video');
        if (v) { v.onended = null; v.onerror = null; try { v.pause(); } catch (_) {} }
      });
    }
    function revealLayer(idx) {
      layers.forEach((e, n) => e.el.classList.toggle('active', n === idx));
    }
    function advance() {
      pos = (pos + 1) % order.length;
      playCurrent();
    }

    // Show whatever is current. A pptx slideshow plays through all its slides and
    // a Google Slides deck plays through its whole deck (restarted at slide 1)
    // before we move on — never cut off mid-deck.
    function playCurrent() {
      clearTimers();
      if (!bootDone) return;                       // boot splash owns the screen first
      if (!items.length) {                         // nothing to play → idle/setup screen
        idle.style.display = 'flex';
        layers.forEach(e => e.el.classList.remove('active'));
        return;
      }
      idle.style.display = 'none';
      const idx = order[pos % order.length];
      const item = items[idx];
      const single = items.length === 1;
      if (item.type === 'slideshow') {
        playSlideshow(idx, single);
      } else if (item.type === 'video') {
        playVideo(idx, single);
      } else if (layers[idx] && layers[idx].slides) {
        playSlidesDeck(idx, single);
      } else {
        revealLayer(idx);
        if (!single) cycleTimer = setTimeout(advance, dur(item));
      }
    }

    // A pptx: one item, many image slides. Step through them, then move on (or
    // loop the show if it's the only thing on the playlist).
    function playSlideshow(idx, single) {
      const entry = layers[idx];
      const item = entry.item;
      const img = entry.el.querySelector('img');
      const srcs = item.srcs || [];
      if (!srcs.length) { if (!single) advance(); return; }
      let s = 0;
      const step = () => {
        img.src = srcs[s];
        revealLayer(idx);
        cycleTimer = setTimeout(() => {
          s += 1;
          if (s >= srcs.length) { if (single) { s = 0; step(); } else advance(); }
          else step();
        }, dur(item));
      };
      step();
    }

    // A Google Slides deck: reload to slide 1 (it auto-advances itself), hold for
    // the whole-deck duration, then move on. loop=false makes it stop on the last
    // slide; we keep the previous layer up until the deck has loaded (no black gap).
    function playSlidesDeck(idx, single) {
      const entry = layers[idx];
      const iframe = entry.el.querySelector('iframe');
      let done = false;
      const go = () => {
        if (done) return;
        done = true;
        clearPendingSlide();
        revealLayer(idx);
        cycleTimer = setTimeout(() => {
          if (single) playSlidesDeck(idx, true);   // replay the deck from slide 1
          else advance();
        }, dur(entry.item));
      };
      iframe.onload = go;
      iframe.src = entry.src;                       // reassigning src restarts at slide 1
      pendingSlide = { iframe, timer: setTimeout(go, 3500) };  // fail-safe if onload never fires
    }

    // A video: play it through and advance when it ends (or loop it if it's the
    // only item). A positive item.seconds caps it; 0 means play in full.
    function playVideo(idx, single) {
      const entry = layers[idx];
      const item = entry.item;
      const v = entry.el.querySelector('video');
      revealLayer(idx);
      v.loop = single;
      try { v.currentTime = 0; } catch (e) {}
      const p = v.play();
      if (p && p.catch) p.catch(() => {});         // autoplay may reject; muted should allow it
      if (single) {
        v.onerror = () => { idle.style.display = 'flex'; };  // a broken lone video → idle, not black
        return;
      }
      let done = false;
      const finish = () => { if (done) return; done = true; v.onended = null; v.onerror = null; advance(); };
      v.onended = finish;
      v.onerror = () => setTimeout(finish, 1000);  // a broken/unreachable video is skipped promptly
      // Advance when the video ends. Fail-safe: the user's cap if set, else the
      // real duration once known, else a sane bound — never 30 minutes of black.
      const fallback = () => (isFinite(v.duration) && v.duration > 0) ? (v.duration + 5) * 1000 : 600000;
      const capMs = (item.seconds && item.seconds > 0) ? item.seconds * 1000 : fallback();
      cycleTimer = setTimeout(finish, capMs);
      v.onloadedmetadata = () => {
        if (done || (item.seconds && item.seconds > 0)) return;
        clearTimeout(cycleTimer);
        cycleTimer = setTimeout(finish, fallback());  // tighten to the real length
      };
    }

    // Show the address for ~1 minute after boot, then hand the screen to content.
    setTimeout(() => {
      bootDone = true;
      document.getElementById('boot').style.display = 'none';
      playCurrent();
    }, 60000);

    loadData();
    setInterval(loadData, 10000);
  </script>
</body>
</html>
