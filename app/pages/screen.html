<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif}
  #stage{position:fixed;inset:0;background:#000;overflow:hidden}
  /* Each playlist item lives in its own absolutely-stacked layer. Layers are
     built once and kept mounted; switching items crossfades opacity so there is
     never a black gap or a "loading" flash between items. The black stage
     background shows through any letterboxing. */
  #stage .layer{position:absolute;inset:0;opacity:0;transition:opacity .4s ease;background:#000}
  #stage .layer.active{opacity:1}
  /* Inactive layers stay rendered (opacity:0, NOT display:none) so the browser
     does not throttle/pause their iframes — a Google Slides deck keeps
     auto-advancing in the background instead of resetting to slide one. */
  #stage .layer img{position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:contain;background:#000}
  #stage .layer iframe{position:absolute;left:0;top:0;width:100%;height:100%;border:0;background:#000}
  /* A Google Slides embed always renders a bottom control/branding bar that no
     URL param can disable. Oversize the iframe so that bar falls past the bottom
     of the (overflow:hidden) stage and is clipped away. */
  #stage .layer iframe.slides{height:calc(100% + 60px)}
  #idle{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa;font-size:18px;text-align:center;padding:24px}
  #idle .big{font-size:clamp(20px,3.2vw,32px);color:#cdd;margin-bottom:16px}
  #idle .hint{font-size:clamp(14px,1.7vw,19px);color:#9aa;line-height:1.5}
  #idle b,#pair .url{color:#F0A93B;font-weight:700}
  #pair{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
        background:rgba(8,10,12,.92);color:#fff;text-align:center;padding:24px;z-index:10}
  #pair .label{color:#9aa;font-size:20px;margin-bottom:18px}
  #pair .code{font:700 clamp(48px,12vw,140px)/1 ui-monospace,monospace;letter-spacing:.12em;color:#F0A93B}
  #pair .sub{color:#9aa;font-size:16px;margin-top:18px}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="idle">
    <div>
      <div class="big">Waiting for content…</div>
      <div class="hint">Open <b id="connectUrl">this device's address</b><br>on your phone or computer to set it up</div>
    </div>
  </div>
  <div id="pair">
    <div class="label">To connect this screen, enter this code on your controller</div>
    <div class="code" id="pairCode"></div>
    <div class="sub">This code disappears in a few minutes. · This screen: <span class="url" id="pairUrl"></span></div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const idle = document.getElementById('idle');
    const pair = document.getElementById('pair');
    const pairCode = document.getElementById('pairCode');
    let items = [];
    let pos = 0;
    let timer = null;
    let signature = '';
    // Cache of mounted layers, keyed by "index|src". Layers are built once and
    // reused across cycles so iframes (especially Google Slides) are never
    // reloaded; crossfading swaps which one is visible.
    let layers = [];

    async function loadData() {
      try {
        const r = await fetch('/api/screen-data', { cache: 'no-store' });
        const data = await r.json();

        // show where to reach this device (idle screen + pairing overlay)
        if (data.connect_url) {
          document.getElementById('connectUrl').textContent = data.connect_url;
          document.getElementById('pairUrl').textContent = data.connect_url;
        }

        // pairing code overlay (shown over whatever is playing)
        if (data.pairing_code) {
          pairCode.textContent = data.pairing_code;
          pair.style.display = 'flex';
        } else {
          pair.style.display = 'none';
        }

        const sig = JSON.stringify(data.items || []);
        if (sig !== signature) {
          signature = sig;
          items = data.items || [];
          pos = 0;
          rebuild();   // (re)build layers only when content actually changes
          show();
        }
      } catch (e) { /* keep showing what we have if a fetch fails */ }
    }

    function embedSrc(u) {
      // Google Slides '/pub' links send X-Frame-Options: SAMEORIGIN and refuse
      // to load in an iframe; '/embed' is the frameable published form.
      u = u || '';
      return /docs\.google\.com\/presentation/.test(u) ? u.replace('/pub', '/embed') : u;
    }

    // Build the DOM layer (an absolutely-positioned wrapper holding the <img> or
    // <iframe>) for one playlist item. Called once per item by rebuild().
    function buildLayer(item) {
      const layer = document.createElement('div');
      layer.className = 'layer';
      const src = embedSrc(item.src);
      let el;
      if (item.type === 'image') {
        el = Object.assign(document.createElement('img'), { src });
      } else {
        el = Object.assign(document.createElement('iframe'), { src, allow: 'autoplay; fullscreen' });
        // tag Slides embeds so the CSS can clip their bottom branding bar
        if (/docs\.google\.com\/presentation/.test(src)) el.className = 'slides';
      }
      layer.appendChild(el);
      return layer;
    }

    // Reconcile the mounted layers with the current `items`. Reuse an existing
    // layer when the same item (same index + src) is still present so its iframe
    // is never reloaded; build new layers for new content; drop layers for
    // content that is gone. Only ever called when the items signature changed.
    function rebuild() {
      const next = [];
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const key = i + '|' + (item.src || '');
        const prev = layers[i];
        let entry;
        if (prev && prev.key === key) {
          entry = prev;            // unchanged at this slot — keep mounted as-is
        } else {
          entry = { key, item, el: buildLayer(item) };
          stage.appendChild(entry.el);
        }
        next.push(entry);
      }
      // remove any cached layers that are no longer part of the playlist
      for (const old of layers) {
        if (!next.includes(old) && old.el.parentNode) old.el.parentNode.removeChild(old.el);
      }
      layers = next;
    }

    function show() {
      if (timer) clearTimeout(timer);
      if (!items.length) { idle.style.display = 'flex'; return; }
      idle.style.display = 'none';
      const i = pos % items.length;
      // Crossfade: reveal the active layer, fade the rest. Inactive layers stay
      // in the DOM at opacity:0 so their iframes keep running in the background.
      layers.forEach((entry, n) => entry.el.classList.toggle('active', n === i));
      // A single self-advancing item (e.g. a Google Slides deck that loops on
      // its own) should stay mounted. Only rotate when there's more than one,
      // otherwise nothing is gained by re-running the timer.
      if (items.length > 1) {
        const secs = Math.max(3, items[i].seconds || 10);
        timer = setTimeout(() => { pos = (pos + 1) % items.length; show(); }, secs * 1000);
      }
    }

    loadData();
    setInterval(loadData, 10000);
  </script>
</body>
</html>
